<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Versat Documentation</title>

  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css">

  <style>
    /* Oculta URL base del spec */
    .swagger-ui .info .url {
      display: none !important;
    }

    /* Estilo más limpio tipo portal */
    body {
      margin: 0;
      background: #f5f5f5;
    }
  </style>
</head>

<body>

  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>

  <script>
    window.ui = SwaggerUIBundle({
      dom_id: "#swagger-ui",

      // 🔥 MULTI DOCUMENTACIÓN
      urls: [
        {
          url: "openapi-api.yaml",
          name: "📘 API Core"
        },
        {
          url: "openapi-webhooks.yaml",
          name: "📡 Webhooks Center"
        }
      ],

      // UI settings
      docExpansion: "list",
      deepLinking: true,
      displayRequestDuration: true,
      defaultModelsExpandDepth: 0,

      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIStandalonePreset
      ],

      layout: "BaseLayout"
    });
  </script>

</body>

</html>
