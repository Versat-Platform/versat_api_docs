<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Versat Docs</title>

  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css">
</head>

<body>

  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>

  <script>
    SwaggerUIBundle({
      dom_id: "#swagger-ui",

      urls: [
        {
          url: "openapi-api.yaml",
          name: "API Core"
        },
        {
          url: "openapi-webhooks.yaml",
          name: "Webhooks"
        }
      ],

      layout: "BaseLayout"
    });
  </script>

</body>

</html>
