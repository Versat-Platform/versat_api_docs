  /Data?recurso=AF41:
    get:
      tags:
        - AF41 - Órdenes de Pago
      summary: Listar Órdenes de Pago
      description: |
        Este endpoint permite consultar registros de Órdenes de Pago utilizando el parámetro obligatorio `recurso`. Al utilizar la autenticación básica el parámetro `empresa_id` es obligatorio, no es necesario si se usa autenticación Bearer Token.  A partir de este valor, puedes complementar la consulta con parámetros opcionales para:

        - Filtrar los datos por campo y valor.

        - Caso sea un recurso con detalle se puede obtener consultar los mismos mediante el parámetro `detalle`.

        - Aplicar paginación y controlar la cantidad de registros devueltos.

        Estos parámetros pueden utilizarse de forma individual o combinada según sea necesario.  
        La API procesa todos los valores enviados en conjunto para devolver el resultado más ajustado posible.

        Si no se envían parámetros opcionales, se retornarán los registros estándar del recurso solicitado.

        ---

           ## Ejemplo de uso
           ### - Con autenticación Basic Auth (requiere empresa_id)

            /api/Polling/Data?recurso=AF41&empresa_id={empresa_id}
            /api/Polling/Data?recurso=AF41&empresa_id={empresa_id}&filtro_campo=Fecha&filtro_valor=2026      
            /api/Polling/Data?recurso=AF41&empresa_id={empresa_id}&pagina=1     
            /api/Polling/Data?recurso=AF41&empresa_id={empresa_id}&pagina=1&registros_por_pagina=100      
            /api/Polling/Data?recurso=AF41&empresa_id={empresa_id}&detalle=Orden_pago_titulo 

           ### - Con autenticación Bearer Token

             /api/Polling/Data?recurso=AF41
             /api/Polling/Data?recurso=AF41&filtro_campo=Fecha&filtro_valor=2026      
             /api/Polling/Data?recurso=AF41&pagina=1      
             /api/Polling/Data?recurso=AF41&pagina=1&registros_por_pagina=100      
             /api/Polling/Data?recurso=AF41&detalle=Orden_pago_titulo
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: AF41

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

        - name: filtro_campo
          in: query
          required: false
          schema:
            type: string
            example: Fecha
          description: Nombre de la propiedad a filtrar

        - name: filtro_valor
          in: query
          required: false
          schema:
            type: string
            example: 2026
          description: Valor a filtrar. Si el valor es una propiedad del tipo fecha, puede
            filtrar por mes y año de la siguiente forma 01/2026 o solo por el
            año 2026

        - name: pagina
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: Página a mostrar con intervalo de 100 registros; pasar valor "0"
            para no paginar y traer los 100 últimos registros.

        - name: registros_por_pagina
          in: query
          required: false
          schema:
            type: integer
            example: 100
          description: Cantidad de registros a mostrar por página; sino se informa el
            valor por defecto es de 100 registros; la cantidad límite para el
            parámetro es de 1000.

        - name: detalle
          in: query
          required: false
          schema:
            type: string
            example: Orden_pago_titulo
          description: Ingrese el nombre de la clase que desea consultar. Ejemplo
            Orden_pago_titulo

      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              examples:
                cabecera:
                  summary: Clase cabecera Orden_pago
                  value:
                    - Status: "ABCD"
                      Total_ro: 123.45 # Total
                      id: 123
                      Fecha: "2026-05-06" # Fecha de lanzamiento
                      Fecha_prev_pago: "2026-05-06" # Fecha de previsión de pago
                      Unidad_id: 123 # Unidad
                      Moneda_id: 123 # Moneda
                      Cuenta_id: 123 # Cuenta
                      Obs: "ABCD" # Observaciones
                      Creacion_hd: "2026-05-06" # Fecha de creación del registro
                      Ult_mod_hd: "2026-05-06" # Ultima modificación del registro
                      Ult_usuario_hd_id: 123 # Ultimo usuario que modifico el registro
                      Moneda_txt: "ABCD"
                      Unidad_txt: "ABCD"
                      Ult_usuario_hd_txt: "ABCD"
                      Cuenta_txt: "ABCD"
                detalle_Orden_pago_titulo:
                  summary: Clase detalle Orden_pago_titulo
                  value:
                    - Descripcion_cb_hd: "ABCD"
