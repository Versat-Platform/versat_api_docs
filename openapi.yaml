  /Data?recurso=OX03:
    get:
      tags:
        - OX03 - Cuentas
      summary: Listar Cuentas
      description: |
        Este endpoint permite consultar registros de Cuentas utilizando el parámetro obligatorio `recurso`. Al utilizar la autenticación básica el parámetro `empresa_id` es obligatorio, no es necesario si se usa autenticación Bearer Token.  A partir de este valor, puedes complementar la consulta con parámetros opcionales para:

        - Filtrar los datos por campo y valor.

        - Caso sea un recurso con detalle se puede obtener consultar los mismos mediante el parámetro `detalle`.

        - Aplicar paginación y controlar la cantidad de registros devueltos.

        Estos parámetros pueden utilizarse de forma individual o combinada según sea necesario.  
        La API procesa todos los valores enviados en conjunto para devolver el resultado más ajustado posible.

        Si no se envían parámetros opcionales, se retornarán los registros estándar del recurso solicitado.

        ---

           ## Ejemplo de uso
           ### - Con autenticación Basic Auth (requiere empresa_id)

            /api/Polling/Data?recurso=OX03&empresa_id={empresa_id}
            /api/Polling/Data?recurso=OX03&empresa_id={empresa_id}&filtro_campo=Fecha&filtro_valor=2026      
            /api/Polling/Data?recurso=OX03&empresa_id={empresa_id}&pagina=1     
            /api/Polling/Data?recurso=OX03&empresa_id={empresa_id}&pagina=1&registros_por_pagina=100      
            /api/Polling/Data?recurso=OX03&empresa_id={empresa_id}&detalle=Empresa_cuenta_rest 

           ### - Con autenticación Bearer Token

             /api/Polling/Data?recurso=OX03
             /api/Polling/Data?recurso=OX03&filtro_campo=Fecha&filtro_valor=2026      
             /api/Polling/Data?recurso=OX03&pagina=1      
             /api/Polling/Data?recurso=OX03&pagina=1&registros_por_pagina=100      
             /api/Polling/Data?recurso=OX03&detalle=Empresa_cuenta_rest
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: OX03

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

        - name: filtro_campo
          in: query
          required: false
          schema:
            type: string
            example: Fecha
          description: Nombre de la propiedad a filtrar

        - name: filtro_valor
          in: query
          required: false
          schema:
            type: string
            example: 2026
          description: Valor a filtrar. Si el valor es una propiedad del tipo fecha, puede
            filtrar por mes y año de la siguiente forma 01/2026 o solo por el
            año 2026

        - name: pagina
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: Página a mostrar con intervalo de 100 registros; pasar valor "0"
            para no paginar y traer los 100 últimos registros.

        - name: registros_por_pagina
