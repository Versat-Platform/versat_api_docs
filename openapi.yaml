  /Data:
    get:
      tags:
        - Analytics
      summary: Visualizar Reportes
      description: Obtenga los reportes que necesite consultando de acuerdo al
        parametro. El resultado es un stream que puede guardar de acuerdo al
        formato pdf o xls
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: IF61

        - name: empresa_id
          in: query
          required: true
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

        - name: reportPath
          in: query
          required: true
          schema:
            type: string
            example: /Financiero/IF61
          description: Dirección vinculada al reporte

        - name: reportParam
          in: query
          required: true
          schema:
            type: string
            example: Entidad_id 123;Unidad_id 123
          description: Parámetros del reporte a ser visualizado

        - name: actividad
          in: query
          required: true
          schema:
            type: string
            example: Visualizar
          description: Visualizar

        - name: format
          in: query
          required: true
          schema:
            type: string
            example: pdf
          description: Formatos definidos pdf o xls.

      responses:
        "200":
          description: "(stream)"
