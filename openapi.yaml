    post:
      tags:
        - OX56 - Operaciones
      summary: Agregar Operaciones
      description: |
        
        Este endpoint permite enviar información  o ejecutar operaciones  sobre registros de Operaciones. Teniendo en cuenta que algunos parámetros se envían por query string y los datos a procesar agregando al body en formato JSON.

        Parámetros por query

        - `recurso`

        - `empresa_id`
        - `detalle`
        - `ids`
        - `motivo`
        - `operacion` 

        ---

          ## Ejemplo de uso
          ### - Con autenticación Basic Auth (requiere empresa_id)

            /api/Polling/Data?recurso=OX56&empresa_id={empresa_id}      
            /api/Polling/Data?recurso=OX56&empresa_id={empresa_id}&detalle=Operacion_cuenta
            /api/Polling/Data?recurso=OX56&empresa_id={empresa_id}&operacion=Aplicar&ids={ids}
            /api/Polling/Data?recurso=OX56&empresa_id={empresa_id}&operacion=Desaplicar&ids={ids}&motivo={motivo}      

          ### - Con autenticación Bearer Token

            /api/Polling/Data?recurso=OX56      
            /api/Polling/Data?recurso=OX56&detalle=Operacion_cuenta
            /api/Polling/Data?recurso=OX56&operacion=Aplicar
        ---

         ## Body (JSON)

           Los datos a procesar deben enviarse en el cuerpo de la petición. El detalle del formato se encuentra en la sección de **Examples**. 
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: OX56

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL
        - name: operacion
          in: query
          required: false
          schema:
            type: string
            example: Aplicar
          description: Ingrese la operación que desea realizar. Ejemplo Aplicar,
            Desaplicar o Anular

        - name: ids
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID del registro, pudiendo pasar dos o más. Ejemplo 1,2,3

        - name: motivo
          in: query
          required: false
          schema:
            type: string
            example: Aplica desde API
          description: En el caso de las operaciones Anular y Desaplicar puede ingresar el
            motivo

        - name: detalle
          in: query
          required: false
          schema:
            type: string
            example: Operacion_cuenta
          description: Ingrese el nombre de la clase que desea consultar. Ejemplo
            Operacion_cuenta, Operacion_doc, Empresa_operacion

