  /Data?recurso=AF51:
    get:
      tags:
        - AF51 - Recibos y Transacciones
      summary: Listar Recibos y Transacciones
      description: |
        Este endpoint permite consultar registros de Recibos y Transacciones utilizando el parámetro obligatorio `recurso`. Al utilizar la autenticación básica el parámetro `empresa_id` es obligatorio, no es necesario si se usa autenticación Bearer Token.  A partir de este valor, puedes complementar la consulta con parámetros opcionales para:

        - Filtrar los datos por campo y valor.

        - Caso sea un recurso con detalle se puede obtener consultar los mismos mediante el parámetro `detalle`.

        - Aplicar paginación y controlar la cantidad de registros devueltos.

        Estos parámetros pueden utilizarse de forma individual o combinada según sea necesario.  
        La API procesa todos los valores enviados en conjunto para devolver el resultado más ajustado posible.

        Si no se envían parámetros opcionales, se retornarán los registros estándar del recurso solicitado.

        ---

           ## Ejemplo de uso
           ### - Con autenticación Basic Auth (requiere empresa_id)

            /api/Polling/Data?recurso=AF51&empresa_id={empresa_id}
            /api/Polling/Data?recurso=AF51&empresa_id={empresa_id}&filtro_campo=Fecha&filtro_valor=2026      
            /api/Polling/Data?recurso=AF51&empresa_id={empresa_id}&pagina=1     
            /api/Polling/Data?recurso=AF51&empresa_id={empresa_id}&pagina=1&registros_por_pagina=100      
            /api/Polling/Data?recurso=AF51&empresa_id={empresa_id}&detalle=Financ_baja 

           ### - Con autenticación Bearer Token

             /api/Polling/Data?recurso=AF51
             /api/Polling/Data?recurso=AF51&filtro_campo=Fecha&filtro_valor=2026      
             /api/Polling/Data?recurso=AF51&pagina=1      
             /api/Polling/Data?recurso=AF51&pagina=1&registros_por_pagina=100      
             /api/Polling/Data?recurso=AF51&detalle=Financ_baja
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: AF51

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

        - name: filtro_campo
          in: query
          required: false
          schema:
            type: string
            example: Fecha
          description: Nombre de la propiedad a filtrar

        - name: filtro_valor
          in: query
          required: false
          schema:
            type: string
            example: 2026
          description: Valor a filtrar. Si el valor es una propiedad del tipo fecha, puede
            filtrar por mes y año de la siguiente forma 01/2026 o solo por el
            año 2026

        - name: pagina
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: Página a mostrar con intervalo de 100 registros; pasar valor "0"
            para no paginar y traer los 100 últimos registros.

        - name: registros_por_pagina
          in: query
          required: false
          schema:
            type: integer
            example: 100
          description: Cantidad de registros a mostrar por página; sino se informa el
            valor por defecto es de 100 registros; la cantidad límite para el
            parámetro es de 1000.

        - name: detalle
          in: query
          required: false
          schema:
            type: string
            example: Financ_baja
          description: Ingrese el nombre de la clase que desea consultar. Ejemplo
            Financ_baja, Financ_caja, Financ_factura

