paths:
  /Data:
    get:
      tags:
        - Analytics
      summary: Visualizar Reportes
      description: |
        Este endpoint permite generar y obtener reportes dinámicos de acuerdo a los parámetros enviados.

        El resultado se devuelve como un flujo de datos (stream), el cual puede ser descargado en formatos como pdf o xls.

        ---

        ## Ejemplos de uso

        ### Visualización en PDF (con empresa)
        `/api/Polling/Data?recurso=IF61&empresa_id={empresa_id}&reportPath=/Financiero/IF61&reportParam=Entidad_id%1%&actividad=Visualizar&format=pdf`

        ### Visualización en PDF (Bearer Token)
        `/api/Polling/Data?recurso=IF61&reportPath=/Financiero/IF61&reportParam=Entidad_id%1%&actividad=Visualizar&format=pdf`
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: IF61

        - name: empresa_id
          in: query
          required: true
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

        - name: reportPath
          in: query
          required: true
          schema:
            type: string
            example: /Financiero/IF61
          description: Dirección vinculada al reporte

        - name: reportParam
          in: query
          required: true
          schema:
            type: string
            example: Entidad_id 123;Unidad_id 123
          description: Parámetros del reporte a ser visualizado

        - name: actividad
          in: query
          required: true
          schema:
            type: string
            example: Visualizar
          description: Visualizar

        - name: format
          in: query
          required: true
          schema:
            type: string
            example: pdf
          description: Formatos definidos pdf o xls.

      responses:
        "200":
          description: "(stream)"

  /Data?recurso=AF01:
    get:
      tags:
        - AF01 - Cotizaciones de Monedas
      summary: Listar Cotizaciones de Monedas
      description: |
        Este endpoint permite consultar registros de Cotizaciones de Monedas utilizando el parámetro obligatorio `recurso`. Al utilizar la autenticación básica el parámetro `empresa_id` es obligatorio, no es necesario si se usa autenticación Bearer Token.  A partir de este valor, puedes complementar la consulta con parámetros opcionales para:

        - Filtrar los datos por campo y valor.

        - Caso sea un recurso con detalle se puede obtener consultar los mismos mediante el parámetro `detalle`.

        - Aplicar paginación y controlar la cantidad de registros devueltos.

        Estos parámetros pueden utilizarse de forma individual o combinada según sea necesario.  
        La API procesa todos los valores enviados en conjunto para devolver el resultado más ajustado posible.

        Si no se envían parámetros opcionales, se retornarán los registros estándar del recurso solicitado.

        ---

           ## Ejemplo de uso
           ### - Con autenticación Basic Auth (requiere empresa_id)

            /api/Polling/Data?recurso=AF01&empresa_id={empresa_id}
            /api/Polling/Data?recurso=AF01&empresa_id={empresa_id}&filtro_campo=Fecha&filtro_valor=2026      
            /api/Polling/Data?recurso=AF01&empresa_id={empresa_id}&pagina=1     
            /api/Polling/Data?recurso=AF01&empresa_id={empresa_id}&pagina=1&registros_por_pagina=100 

           ### - Con autenticación Bearer Token

             /api/Polling/Data?recurso=AF01
             /api/Polling/Data?recurso=AF01&filtro_campo=Fecha&filtro_valor=2026      
             /api/Polling/Data?recurso=AF01&pagina=1      
             /api/Polling/Data?recurso=AF01&pagina=1&registros_por_pagina=100
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: AF01

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

        - name: filtro_campo
          in: query
          required: false
          schema:
            type: string
            example: Fecha
          description: Nombre de la propiedad a filtrar

        - name: filtro_valor
          in: query
          required: false
          schema:
            type: string
            example: 2026
          description: Valor a filtrar. Si el valor es una propiedad del tipo fecha, puede
            filtrar por mes y año de la siguiente forma 01/2026 o solo por el
            año 2026

        - name: pagina
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: Página a mostrar con intervalo de 100 registros; pasar valor "0"
            para no paginar y traer los 100 últimos registros.

        - name: registros_por_pagina
          in: query
          required: false
          schema:
            type: integer
            example: 100
          description: Cantidad de registros a mostrar por página; sino se informa el
            valor por defecto es de 100 registros; la cantidad límite para el
            parámetro es de 1000.

      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              examples:
                cabecera:
                  summary: Clase cabecera Cotizacion
                  value:
                    - id: 123
                      Fecha: "2026-05-06"
                      Cotizacion_tipo_id: 123 # Tipo
                      Compra: 123.45
                      Venta: 123.45
                      Cotizacion_tipo_txt: "ABCD"
                      Empresa_txt: "ABCD"
                cabecera_con_paginacion:
                  summary: Clase cabecera (con paginación)
                  value:
                    TotalItems: 962743
                    ItemsPerPage: 100
                    ActualPage: 1
                    TotalPages: 9628
                    Items:
                      - id: 123
                        Fecha: "2026-05-06"
                        Cotizacion_tipo_id: 123 # Tipo
                        Compra: 123.45
                        Venta: 123.45
                        Cotizacion_tipo_txt: "ABCD"
                        Empresa_txt: "ABCD"
    post:
      tags:
        - AF01 - Cotizaciones de Monedas
      summary: Agregar Cotizaciones de Monedas
      description: |
        
        Este endpoint permite enviar información  sobre registros de Cotizaciones de Monedas. Teniendo en cuenta que algunos parámetros se envían por query string y los datos a procesar agregando al body en formato JSON.

        Parámetros por query

        - `recurso`

        - `empresa_id` 

        ---

          ## Ejemplo de uso
          ### - Con autenticación Basic Auth (requiere empresa_id)

            /api/Polling/Data?recurso=AF01&empresa_id={empresa_id}      

          ### - Con autenticación Bearer Token

            /api/Polling/Data?recurso=AF01
        ---

         ## Body (JSON)

           Los datos a procesar deben enviarse en el cuerpo de la petición. El detalle del formato se encuentra en la sección de **Examples**. 
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: AF01

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            examples:
              cabecera:
                summary: Clase cabecera Cotizacion
                value:
                  - Fecha: "2026-05-06"
                    Cotizacion_tipo_id: 123 # Tipo
                    Compra: 123.45
                    Venta: 123.45
      responses:
        "200":
          description: "0123456789"

    put:
      tags:
        - AF01 - Cotizaciones de Monedas
      summary: Actualizar Cotizaciones de Monedas
      description: |
        
        Este endpoint permite actualizar registros de Cotizaciones de Monedas sobre registros de Cotizaciones de Monedas. Algunos parámetros se envían por query string para identificar el registro, mientras que los datos a actualizar se agregan al body en formato JSON

        Parámetros por query

        - `recurso`

        - `id`

        - `empresa_id` 

        ---

          ## Ejemplo de uso
          ### - Con autenticación Basic Auth (requiere empresa_id)

            /api/Polling/Data?recurso=AF01&empresa_id={empresa_id}&id={id}      

          ### - Con autenticación Bearer Token

            /api/Polling/Data?recurso=AF01&id={id}
        ---

         ## Body (JSON)

           Los datos a actualizar deben enviarse en el cuerpo de la petición. El detalle del formato se encuentra en la sección de **Examples**. 
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: AF01

        - name: Id
          in: query
          required: true
          schema:
            type: integer
            example: 1
          description: Id del registro a actualizar.

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            examples:
              cabecera:
                summary: Clase cabecera Cotizacion
                value:
                  - Fecha: "2026-05-06"
                    Cotizacion_tipo_id: 123 # Tipo
                    Compra: 123.45
                    Venta: 123.45
      responses:
        "200":
          description: "0123456789"

  /Data?recurso=AF31:
    get:
      tags:
        - AF31 - Facturas
      summary: Listar Facturas
      description: |
        Este endpoint permite consultar registros de Facturas utilizando el parámetro obligatorio `recurso`. Al utilizar la autenticación básica el parámetro `empresa_id` es obligatorio, no es necesario si se usa autenticación Bearer Token.  A partir de este valor, puedes complementar la consulta con parámetros opcionales para:

