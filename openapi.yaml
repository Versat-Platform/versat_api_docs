    post:
      tags:
        - OX54 - Tipos de Tributación
      summary: Agregar Tipos de Tributación
      description: |
        
        Este endpoint permite enviar información  o ejecutar operaciones  sobre registros de Tipos de Tributación. Teniendo en cuenta que algunos parámetros se envían por query string y los datos a procesar agregando al body en formato JSON.

        Parámetros por query

        - `recurso`

        - `empresa_id`
        - `detalle`
        - `ids`
        - `motivo`
        - `operacion` 

        ---

          ## Ejemplo de uso
          ### - Con autenticación Basic Auth (requiere empresa_id)

            /api/Polling/Data?recurso=OX54&empresa_id={empresa_id}      
            /api/Polling/Data?recurso=OX54&empresa_id={empresa_id}&detalle=Stock_cuenta
            /api/Polling/Data?recurso=OX54&empresa_id={empresa_id}&operacion=Aplicar&ids={ids}
            /api/Polling/Data?recurso=OX54&empresa_id={empresa_id}&operacion=Desaplicar&ids={ids}&motivo={motivo}      

          ### - Con autenticación Bearer Token

            /api/Polling/Data?recurso=OX54      
            /api/Polling/Data?recurso=OX54&detalle=Stock_cuenta
            /api/Polling/Data?recurso=OX54&operacion=Aplicar
        ---

         ## Body (JSON)

           Los datos a procesar deben enviarse en el cuerpo de la petición. El detalle del formato se encuentra en la sección de **Examples**. 
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: OX54

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL
        - name: operacion
          in: query
          required: false
          schema:
            type: string
            example: Aplicar
          description: Ingrese la operación que desea realizar. Ejemplo Aplicar,
            Desaplicar o Anular

        - name: ids
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID del registro, pudiendo pasar dos o más. Ejemplo 1,2,3

        - name: motivo
          in: query
          required: false
          schema:
            type: string
            example: Aplica desde API
          description: En el caso de las operaciones Anular y Desaplicar puede ingresar el
            motivo

        - name: detalle
          in: query
          required: false
          schema:
            type: string
            example: Stock_cuenta
          description: Ingrese el nombre de la clase que desea consultar. Ejemplo
            Stock_cuenta

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            examples:
              cabecera:
                summary: Clase cabecera Tributacion
                value:
                  - Descripcion_cb: "ABCD" # Descripción
                    Perc_iva: 123.45 # Porcentaje de IVA
                    Incidencia: 123.45 # Informe el porcentaje de incidencia del impuesto
                    Ret_iva: 123.45 # Porcentaje Retención IVA
                    Ret_renta: 123.45 # Porcentaje Retención Renta
                    Cuenta_credito_id: 123 # Cuenta Crédito Fiscal
                    Cuenta_debito_id: 123 # Cuenta Débito Fiscal
                    Inactivo_sn: "ABCD" # Inactivo
                    Modelo_id: 123 # Modelo de negocio
                    Obs: "ABCD" # Observaciones
              detalle_Stock_cuenta:
                summary: Clase detalle Stock_cuenta
                value:
                  - Producto_subgrupo_id: 123 # Subgrupo
                    Tributacion_id: 123 # Tributación
                    Cuenta_stock_id: 123 # Cuenta de Stock
                    Cuenta_costo_id: 123 # Cuenta de Costo
                    Cuenta_venta_id: 123 # Cuenta de Ventas
                    Cuenta_dev_id: 123 # Cuenta Devoluciones de Ventas
                    Cuenta_costo_exp_id: 123 # Cuenta Costo Exportación
                    Cuenta_venta_exp_id: 123 # Cuenta Venta Exportación
      responses:
        "200":
          description: "0123456789"

