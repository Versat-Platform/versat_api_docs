      tags:
        - AX85 - Auditoría
      summary: Listar Auditoría
      description: Obtiene todos los registros de Auditoría. Permite filtrar resultados mediante parámetros de búsqueda por campo y valor.
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: AX85

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación del tipo 'Bearer Token' este parámetro no es necesario en la URL

        - name: filtro_campo
          in: query
          required: false
          schema:
            type: string
            example: Fecha
          description: Nombre de la propiedad a filtrar

        - name: filtro_valor
          in: query
          required: false
          schema:
            type: string
            example: 2026
          description: Valor a filtrar. Si el valor es una propiedad del tipo fecha, puede filtrar por mes y año de la siguiente forma 01/2026 o solo por el año 2026

        - name: pagina
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: Página a mostrar con intervalo de 100 registros; pasar valor "0" para no paginar y traer los 100 últimos registros.

        - name: registros_por_pagina
          in: query
          required: false
          schema:
            type: integer
            example: 100
          description: Cantidad de registros a mostrar por página; sino se informa el valor por defecto es de 100 registros; la cantidad límite para el parámetro es de 1000.

      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              examples:
                sin_paginacion:
                  summary: Ejemplo sin paginación (pagina = 0)
                  value:
                    - id: 123
                      Fecha: "2026-04-17"
                      Ejercicio_id: 123 # Ejercicio
                      Auditor_id: 123 # Auditor
                      Ejercicio_txt: "ABCD"
                      Empresa_txt: "ABCD"
                      Entidad_txt: "ABCD"

                con_paginacion:
                  summary: Ejemplo con paginación
                  value:
                    TotalItems: 962743
                    ItemsPerPage: 100
                    ActualPage: 1
                    TotalPages: 9628
                    Items:
                      - id: 123
                        Fecha: "2026-04-17"
                        Ejercicio_id: 123 # Ejercicio
                        Auditor_id: 123 # Auditor
                        Ejercicio_txt: "ABCD"
                        Empresa_txt: "ABCD"
                        Entidad_txt: "ABCD"
    post:
      tags:
        - AX85 - Auditoría
      summary: Agregar Auditoría
      description: Crea un nuevo registro de Auditoría en Versat ERP.
      parameters:
        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación del tipo 'Bearer Token' este parámetro no es necesario en la URL

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              Fecha: "2026-04-17"
              Ejercicio_id: 123 # Ejercicio
              Auditor_id: 123 # Auditor
      responses:
        "200":
          description: "0123456789"

    put:
      tags:
        - AX85 - Auditoría
      summary: Actualizar Auditoría
      description: Actualiza un registro de Auditoría
      parameters:
        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación del tipo 'Bearer Token' este parámetro no es necesario en la URL

        - name: Id
          in: query
          required: true
          schema:
            type: integer
            example: 1
          description: Id del registro a actualizar.

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              Fecha: "2026-04-17"
              Ejercicio_id: 123 # Ejercicio
              Auditor_id: 123 # Auditor
      responses:
        "200":
          description: "0123456789"

