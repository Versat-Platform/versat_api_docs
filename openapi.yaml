  /Data?recurso=OX56:
    get:
      tags:
        - OX56 - Operaciones
      summary: Listar Operaciones
      description: |
        Este endpoint permite consultar registros de Operaciones utilizando el parámetro obligatorio `recurso`. Al utilizar la autenticación básica el parámetro `empresa_id` es obligatorio, no es necesario si se usa autenticación Bearer Token.  A partir de este valor, puedes complementar la consulta con parámetros opcionales para:

        - Filtrar los datos por campo y valor.

        - Caso sea un recurso con detalle se puede obtener consultar los mismos mediante el parámetro `detalle`.

        - Aplicar paginación y controlar la cantidad de registros devueltos.

        Estos parámetros pueden utilizarse de forma individual o combinada según sea necesario.  
        La API procesa todos los valores enviados en conjunto para devolver el resultado más ajustado posible.

        Si no se envían parámetros opcionales, se retornarán los registros estándar del recurso solicitado.

        ---

           ## Ejemplo de uso
           ### - Con autenticación Basic Auth (requiere empresa_id)

            /api/Polling/Data?recurso=OX56&empresa_id={empresa_id}
            /api/Polling/Data?recurso=OX56&empresa_id={empresa_id}&filtro_campo=Fecha&filtro_valor=2026      
            /api/Polling/Data?recurso=OX56&empresa_id={empresa_id}&pagina=1     
            /api/Polling/Data?recurso=OX56&empresa_id={empresa_id}&pagina=1&registros_por_pagina=100      
            /api/Polling/Data?recurso=OX56&empresa_id={empresa_id}&detalle=Operacion_cuenta 

           ### - Con autenticación Bearer Token

             /api/Polling/Data?recurso=OX56
             /api/Polling/Data?recurso=OX56&filtro_campo=Fecha&filtro_valor=2026      
             /api/Polling/Data?recurso=OX56&pagina=1      
             /api/Polling/Data?recurso=OX56&pagina=1&registros_por_pagina=100      
             /api/Polling/Data?recurso=OX56&detalle=Operacion_cuenta
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: OX56

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

        - name: filtro_campo
          in: query
          required: false
          schema:
            type: string
            example: Fecha
          description: Nombre de la propiedad a filtrar

        - name: filtro_valor
          in: query
          required: false
          schema:
            type: string
            example: 2026
          description: Valor a filtrar. Si el valor es una propiedad del tipo fecha, puede
            filtrar por mes y año de la siguiente forma 01/2026 o solo por el
            año 2026

        - name: pagina
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: Página a mostrar con intervalo de 100 registros; pasar valor "0"
            para no paginar y traer los 100 últimos registros.

        - name: registros_por_pagina
          in: query
          required: false
          schema:
            type: integer
            example: 100
          description: Cantidad de registros a mostrar por página; sino se informa el
            valor por defecto es de 100 registros; la cantidad límite para el
            parámetro es de 1000.

        - name: detalle
          in: query
          required: false
          schema:
            type: string
            example: Operacion_cuenta
          description: Ingrese el nombre de la clase que desea consultar. Ejemplo
            Operacion_cuenta, Operacion_doc, Empresa_operacion

      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              examples:
                cabecera:
                  summary: Clase cabecera Operacion
                  value:
                    - id: 123
                      Modelo_id: 123 # Modelo de Negocio
                      Descripcion_cb: "ABCD" # Descripción
                      Centro_costo_id: 123 # Centro de Costo
                      Habilitar_nueva_empresa_sn: "ABCD" # Habilitar automáticamente en nuevas empresas
                      Centro_costo_txt: "ABCD"
                      Modelo_txt: "ABCD"
                detalle_Operacion_cuenta:
                  summary: Clase detalle Operacion_cuenta
                  value:
                    - Empresa_cuenta_ro: "ABCD" # Empresa
                      id: 123
                      Operacion_id: 123 # Operación
                      Cuenta_id: 123 # Cuenta
