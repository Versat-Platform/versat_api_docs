            /api/Polling/Data?recurso=AF81&empresa_id={empresa_id}&filtro_campo=Fecha&filtro_valor=2026      
            /api/Polling/Data?recurso=AF81&empresa_id={empresa_id}&pagina=1     
            /api/Polling/Data?recurso=AF81&empresa_id={empresa_id}&pagina=1&registros_por_pagina=100      
            /api/Polling/Data?recurso=AF81&empresa_id={empresa_id}&detalle=Conc_banc_mov 

           ### - Con autenticación Bearer Token

