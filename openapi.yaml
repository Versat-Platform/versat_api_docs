            /api/Polling/Data?recurso=AF51&empresa_id={empresa_id}&operacion=Aplicar&ids={ids}
            /api/Polling/Data?recurso=AF51&empresa_id={empresa_id}&operacion=Desaplicar&ids={ids}&motivo={motivo}      

