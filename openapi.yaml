             /api/Polling/Data?recurso=OC23&filtro_campo=Fecha&filtro_valor=2026      
             /api/Polling/Data?recurso=OC23&pagina=1      
             /api/Polling/Data?recurso=OC23&pagina=1&registros_por_pagina=100
