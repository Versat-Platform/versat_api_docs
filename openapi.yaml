    post:
      tags:
        - AI71 - Facturas
      summary: Agregar Facturas
      description: |
        
        Este endpoint permite enviar información  o ejecutar operaciones  sobre registros de Facturas. Teniendo en cuenta que algunos parámetros se envían por query string y los datos a procesar agregando al body en formato JSON.

        Parámetros por query

        - `recurso`

        - `empresa_id`
        - `detalle`
        - `ids`
        - `motivo`
        - `operacion` 

        ---

          ## Ejemplo de uso
          ### - Con autenticación Basic Auth (requiere empresa_id)

            /api/Polling/Data?recurso=AI71&empresa_id={empresa_id}      
            /api/Polling/Data?recurso=AI71&empresa_id={empresa_id}&detalle=Factura_producto
            /api/Polling/Data?recurso=AI71&empresa_id={empresa_id}&operacion=Aplicar&ids={ids}
            /api/Polling/Data?recurso=AI71&empresa_id={empresa_id}&operacion=Desaplicar&ids={ids}&motivo={motivo}      

          ### - Con autenticación Bearer Token

            /api/Polling/Data?recurso=AI71      
            /api/Polling/Data?recurso=AI71&detalle=Factura_producto
            /api/Polling/Data?recurso=AI71&operacion=Aplicar
        ---

         ## Body (JSON)

           Los datos a procesar deben enviarse en el cuerpo de la petición. El detalle del formato se encuentra en la sección de **Examples**. 
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: AI71

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL
        - name: operacion
          in: query
          required: false
          schema:
            type: string
            example: Aplicar
          description: Ingrese la operación que desea realizar. Ejemplo Aplicar,
            Desaplicar o Anular

        - name: ids
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID del registro, pudiendo pasar dos o más. Ejemplo 1,2,3

        - name: motivo
          in: query
          required: false
          schema:
            type: string
            example: Aplica desde API
          description: En el caso de las operaciones Anular y Desaplicar puede ingresar el
            motivo

        - name: detalle
          in: query
          required: false
          schema:
            type: string
            example: Factura_producto
          description: Ingrese el nombre de la clase que desea consultar. Ejemplo
            Factura_producto, Factura_cuota, Factura_flete, Factura_retencion,
            Factura_clasificacion, Factura_baja

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            examples:
              cabecera:
                summary: Clase cabecera Factura_insumos
                value:
                  - Status: "ABCD"
                    Pedido_tipo_id: 123 # Tipo de Negociación
                    Vendedor_id: 123 # Vendedor
                    Caja_mov_hd: "ABCD"
                    Padron_3_sn_hd: "ABCD"
                    Cuenta_tipo_hd: "ABCD"
                    descripcion_hd_cb: "ABCD"
                    Total_hd: 123.45
                    Gravada_hd: 123.45
                    Iva_hd: 123.45
                    Fecha: "2026-05-06" # Fecha de Movimiento
                    Fecha_doc: "2026-05-06" # Fecha del Documento
                    Documento_tipo_id: 123 # Tipo de Documento
                    Operacion_doc_id: 123 # Operación
                    Entidad_id: 123 # Entidad
                    Entidad_ubicacion_id: 123 # Ubicación
                    Zafra_id: 123 # Zafra
                    Ctb_proyecto_id: 123 # Proyecto
                    Unidad_id: 123 # Unidad de Lanzamiento
                    Doc_num: "ABCD" # Número Documento
                    Timbrado_id: 123 # Timbrado
                    Codigo_control_elec: "ABCD" # Código de control (CDC)
                    Deposito_id: 123 # Depósito
                    Factura_ref_id: 123 # Factura de Referencia
                    Contrato_id: 123 # Contrato
                    Chapa_id: 123 # Chapa
                    Chofer_id: 123 # Chofer
                    Transportadora_id: 123 # Transportadora
                    Emision_doc_hd: "ABCD"
                    Moneda_doc_id: 123 # Moneda del Documento
