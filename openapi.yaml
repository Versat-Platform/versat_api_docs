                    Nombre_comercial_id: 123 # Nombre Comercial
                    Producto_id: 123 # Producto
                    Potencial: 123.45 # Dosis/ha 
                    Aplicacion_dosis: 123 # Aplicaciones
                    Precio_plan: 123.45 # Precio planificado 
                    Fase_cultivo_id: 123 # Fase de cultivo
                    Fecha: "2026-05-06" # Fecha inicial de venta
                    Fecha_final: "2026-05-06" # Fecha final de venta
                    Costo_plan: 123.45 # Costo planificado
