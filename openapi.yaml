    post:
      tags:
        - BA31 - Entidades
      summary: Agregar Entidades
      description: |
        
        Este endpoint permite enviar información  sobre registros de Entidades. Teniendo en cuenta que algunos parámetros se envían por query string y los datos a procesar agregando al body en formato JSON.

        Parámetros por query

        - `recurso`

        - `empresa_id`
        - `detalle` 

        ---

          ## Ejemplo de uso
          ### - Con autenticación Basic Auth (requiere empresa_id)

            /api/Polling/Data?recurso=BA31&empresa_id={empresa_id}      
            /api/Polling/Data?recurso=BA31&empresa_id={empresa_id}&detalle=Contacto      

          ### - Con autenticación Bearer Token

            /api/Polling/Data?recurso=BA31      
            /api/Polling/Data?recurso=BA31&detalle=Contacto
        ---

         ## Body (JSON)

           Los datos a procesar deben enviarse en el cuerpo de la petición. El detalle del formato se encuentra en la sección de **Examples**. 
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: BA31

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

        - name: detalle
          in: query
          required: false
          schema:
            type: string
            example: Contacto
          description: Ingrese el nombre de la clase que desea consultar. Ejemplo
            Contacto, Entidad_ubicacion, Entidad_familiar, Entidad_limite,
            Entidad_garantia, Entidad_codeudor, Cliente_referencia,
            Timbrado_entidad, Entidad_clt, Entidad_reg_especial, Entidad_balance

