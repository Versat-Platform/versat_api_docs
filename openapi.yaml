        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              examples:
                cabecera:
                  summary: Clase cabecera Depreciacion
                  value:
                    - Status: "ABCD"
                      id: 123
                      Fecha: "2026-05-06"
                      Biene_tipo_id: 123 # Clasificación de Bienes
                      Biene_id: 123 # Bien (Activo Fijo)
                      Empresa_txt: "ABCD"
                      Biene_tipo_txt: "ABCD"
                      Biene_txt: "ABCD"
                cabecera_con_paginacion:
                  summary: Clase cabecera (con paginación)
                  value:
                    TotalItems: 962743
                    ItemsPerPage: 100
                    ActualPage: 1
                    TotalPages: 9628
                    Items:
                      - Status: "ABCD"
