            /api/Polling/Data?recurso=AG72&empresa_id={empresa_id}&filtro_campo=Fecha&filtro_valor=2026      
            /api/Polling/Data?recurso=AG72&empresa_id={empresa_id}&pagina=1     
            /api/Polling/Data?recurso=AG72&empresa_id={empresa_id}&pagina=1&registros_por_pagina=100      
