                      Haber_ro: 123.45 # Haber
                      Cheque_ro: "ABCD" # Detalle
                      id: 123
                      Conc_banc_id: 123
                      Flujo_caja_conc_id: 123 # Movimiento
                      Conc_banc_txt: "ABCD"
                      Flujo_caja_conc_txt: "ABCD"
                detalle_Conc_banc_ch_emit:
