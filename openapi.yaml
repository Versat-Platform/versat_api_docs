info:
  title: Versat Integration Platform
  version: 2026.05.06
  description: |
    
    Este portal documenta los dos principales mecanismos de integración del sistema Versat:

    - Webhooks (eventos automáticos hacia sistemas externos)

    - API REST (consumo y gestión de datos)

    ---

    # Webhooks (OP50)

    El Webhooks permite configurar integraciones mediante la comunicación con sistemas externos a través de un **Endpoint URL**.

    La ejecución se realiza mediante métodos HTTP como **GET, POST, PUT o DELETE**, según la configuración definida.

    ---

    ## Envío de datos

    Dependiendo del método HTTP seleccionado, la información puede enviarse de las siguientes formas:

    - Body (JSON)

    - URL Parameters

    ---

    ## Activación del Webhook

    El Webhook se ejecuta automáticamente en base a la **Actividad** configurada en el formulario, y puede incluir condiciones adicionales.

    Estas condiciones pueden depender de:

    - Clase del sistema que dispara el evento

    - Atributos del registro

    - Reglas de negocio configuradas

    ---

    ## Ejemplo de activación

    Un Webhook puede ejecutarse cuando:

    - Se aplica una factura con total mayor a cero

    - Se elimina un registro para notificar al sistema externo

    ---

    ## Headers

    En la pestaña de **Headers**, se pueden definir valores que se enviarán en la petición HTTP, como:

    - Tokens de autenticación

    - API Keys

    - Información adicional requerida por el sistema destino

    ---


    # API REST

    La API de Versat ofrece un servicio para acceder y manipular datos bajo el protocolo **HTTPS** en el estándar **RESTful**.

    Permite realizar operaciones de consulta, creación, actualización y eliminación de información del sistema.

    ---

    # URL Base

    ```
    https://app.versat.ag/api/Polling/
    ```

    ---

    ## Autenticación

    Todas las llamadas deben ser autenticadas mediante headers HTTP.

     ### Métodos de autenticación

    La API de Versat soporta los siguientes métodos de autenticación, los cuales deben ser enviados en los headers de cada solicitud:

    - **Basic Authentication**  
      Utiliza usuario y contraseña. Las credenciales son generadas y gestionadas únicamente por el administrador dentro del ERP, en el módulo de usuarios.

    - **Bearer Token**  
      Utiliza un token de acceso generado desde el ERP. Estos tokens son administrados por el administrador del sistema en el módulo de tokens.

    ---

    ## Permisos

    El acceso a los recursos está definido por los permisos del usuario en el sistema Versat.

    - Acceso limitado por roles

    - Operaciones según autorización

    - Seguridad a nivel de sistema

    ---

    ## Recursos API

    La API está organizada por **recursos**, donde cada uno representa una entidad funcional del sistema.

    A través de estos recursos es posible realizar operaciones de:

    - Consulta de datos  
    - Creación de registros  
    - Actualización de información  

    Adicionalmente, la API dispone de una sección de **reportes**, que permite la consulta de información consolidada y estructurada.

    Tanto los recursos como los reportes se describen en detalle a continuación.

