             /api/Polling/Data?recurso=RP71&pagina=1      
             /api/Polling/Data?recurso=RP71&pagina=1&registros_por_pagina=100
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: RP71

