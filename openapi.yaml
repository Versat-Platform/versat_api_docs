paths:
  /AF01:
    get:
      tags:
        - AF01 - Cotizaciones de Monedas
      summary: Listar Cotizaciones de Monedas
      description: Obtiene todos los registros de Cotizaciones de Monedas. Permite
        filtrar resultados mediante parámetros de búsqueda por campo y valor.
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: AF01

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

        - name: filtro_campo
          in: query
          required: false
          schema:
            type: string
            example: Fecha
          description: Nombre de la propiedad a filtrar

        - name: filtro_valor
          in: query
          required: false
          schema:
            type: string
            example: 2026
          description: Valor a filtrar. Si el valor es una propiedad del tipo fecha, puede
            filtrar por mes y año de la siguiente forma 01/2026 o solo por el
            año 2026

        - name: pagina
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: Página a mostrar con intervalo de 100 registros; pasar valor "0"
            para no paginar y traer los 100 últimos registros.

        - name: registros_por_pagina
          in: query
          required: false
          schema:
            type: integer
            example: 100
          description: Cantidad de registros a mostrar por página; sino se informa el
            valor por defecto es de 100 registros; la cantidad límite para el
            parámetro es de 1000.

      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              examples:
                cabecera:
                  summary: Clase cabecera Cotizacion
                  value:
                    - id: 123
                      Fecha: "2026-04-21"
                      Cotizacion_tipo_id: 123 # Tipo
                      Compra: 123.45
                      Venta: 123.45
                      Cotizacion_tipo_txt: "ABCD"
                      Empresa_txt: "ABCD"
                cabecera_con_paginacion:
                  summary: Clase cabecera (con paginación)
                  value:
                    TotalItems: 962743
                    ItemsPerPage: 100
                    ActualPage: 1
                    TotalPages: 9628
                    Items:
                      - id: 123
                        Fecha: "2026-04-21"
                        Cotizacion_tipo_id: 123 # Tipo
                        Compra: 123.45
                        Venta: 123.45
                        Cotizacion_tipo_txt: "ABCD"
                        Empresa_txt: "ABCD"
    post:
      tags:
        - AF01 - Cotizaciones de Monedas
      summary: Agregar Cotizaciones de Monedas
      description: Crea un nuevo registro de Cotizaciones de Monedas en Versat ERP.
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: AF01

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            examples:
              cabecera:
                summary: Clase cabecera Cotizacion
                value:
                  - Fecha: "2026-04-21"
                    Cotizacion_tipo_id: 123 # Tipo
                    Compra: 123.45
                    Venta: 123.45
      responses:
        "200":
          description: "0123456789"

    put:
      tags:
        - AF01 - Cotizaciones de Monedas
      summary: Actualizar Cotizaciones de Monedas
      description: Actualiza un registro de Cotizaciones de Monedas
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: AF01

        - name: Id
          in: query
          required: true
          schema:
            type: integer
            example: 1
          description: Id del registro a actualizar.

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            examples:
              cabecera:
                summary: Clase cabecera Cotizacion
                value:
                  - Fecha: "2026-04-21"
                    Cotizacion_tipo_id: 123 # Tipo
                    Compra: 123.45
                    Venta: 123.45
      responses:
        "200":
          description: "0123456789"

