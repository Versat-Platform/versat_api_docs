openapi: 3.0.3
info:
  title: Versat API
  version: 2026.04.21
  description: |
    La API de Versat permite acceder y manipular datos mediante el protocolo HTTPS, siguiendo el estándar RESTful.

    **Autenticación:** Todas las solicitudes requieren autenticación a través de encabezados HTTP. Se admiten los siguientes métodos:

    - Basic Auth: utilizando usuario y contraseña.

    - Bearer Token: utilizando un token generado en el ERP.

    **Permisos:** El acceso a los recursos está determinado por los permisos asignados al usuario dentro del sistema.

    **Importante:** No comparta sus credenciales ni tokens de acceso.
