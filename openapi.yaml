      description: |
        
        Este endpoint permite enviar información  o ejecutar operaciones  sobre registros de Recibos y Transacciones. Teniendo en cuenta que algunos parámetros se envían por query string y los datos a procesar agregando al body en formato JSON.

        Parámetros por query

        - `recurso`

        - `empresa_id`
        - `detalle`
        - `ids`
        - `motivo`
        - `operacion` 

