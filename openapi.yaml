  /Data?recurso=AM61:
    get:
      tags:
        - AM61 - Mediciones de Áreas
      summary: Listar Mediciones de Áreas
      description: |
        Este endpoint permite consultar registros de Mediciones de Áreas utilizando el parámetro obligatorio `recurso`. Al utilizar la autenticación básica el parámetro `empresa_id` es obligatorio, no es necesario si se usa autenticación Bearer Token.  A partir de este valor, puedes complementar la consulta con parámetros opcionales para:

        - Filtrar los datos por campo y valor.

        - Caso sea un recurso con detalle se puede obtener consultar los mismos mediante el parámetro `detalle`.

        - Aplicar paginación y controlar la cantidad de registros devueltos.

        Estos parámetros pueden utilizarse de forma individual o combinada según sea necesario.  
        La API procesa todos los valores enviados en conjunto para devolver el resultado más ajustado posible.

        Si no se envían parámetros opcionales, se retornarán los registros estándar del recurso solicitado.

        ---

           ## Ejemplo de uso
           ### - Con autenticación Basic Auth (requiere empresa_id)

            /api/Polling/Data?recurso=AM61&empresa_id={empresa_id}
            /api/Polling/Data?recurso=AM61&empresa_id={empresa_id}&filtro_campo=Fecha&filtro_valor=2026      
            /api/Polling/Data?recurso=AM61&empresa_id={empresa_id}&pagina=1     
            /api/Polling/Data?recurso=AM61&empresa_id={empresa_id}&pagina=1&registros_por_pagina=100 

           ### - Con autenticación Bearer Token

             /api/Polling/Data?recurso=AM61
             /api/Polling/Data?recurso=AM61&filtro_campo=Fecha&filtro_valor=2026      
             /api/Polling/Data?recurso=AM61&pagina=1      
             /api/Polling/Data?recurso=AM61&pagina=1&registros_por_pagina=100
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: AM61

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

        - name: filtro_campo
          in: query
          required: false
          schema:
            type: string
            example: Fecha
          description: Nombre de la propiedad a filtrar

        - name: filtro_valor
          in: query
          required: false
          schema:
            type: string
            example: 2026
          description: Valor a filtrar. Si el valor es una propiedad del tipo fecha, puede
            filtrar por mes y año de la siguiente forma 01/2026 o solo por el
            año 2026

        - name: pagina
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: Página a mostrar con intervalo de 100 registros; pasar valor "0"
            para no paginar y traer los 100 últimos registros.

        - name: registros_por_pagina
          in: query
          required: false
          schema:
            type: integer
            example: 100
          description: Cantidad de registros a mostrar por página; sino se informa el
            valor por defecto es de 100 registros; la cantidad límite para el
            parámetro es de 1000.

      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              examples:
                cabecera:
                  summary: Clase cabecera Medicion_area
                  value:
                    - id: 123
                      Fecha: "2026-05-06"
                      Entidad_id: 123 # Entidad
                      Descripcion: "ABCD" # Descripción
                      Url_hyp: "ABCD" # Link
                      Usuario_ro_id: 123 # Usuario
                      Vendedor_id: 123 # Vendedor
                      Entidad_txt: "ABCD"
                      Empresa_txt: "ABCD"
                      Vendedor_txt: "ABCD"
                      Usuario_txt: "ABCD"
                cabecera_con_paginacion:
                  summary: Clase cabecera (con paginación)
                  value:
                    TotalItems: 962743
                    ItemsPerPage: 100
                    ActualPage: 1
                    TotalPages: 9628
