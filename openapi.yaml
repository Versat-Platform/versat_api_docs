            /api/Polling/Data?recurso=AM31&empresa_id={empresa_id}&operacion=Aplicar&ids={ids}
            /api/Polling/Data?recurso=AM31&empresa_id={empresa_id}&operacion=Desaplicar&ids={ids}&motivo={motivo}      

          ### - Con autenticación Bearer Token

            /api/Polling/Data?recurso=AM31      
            /api/Polling/Data?recurso=AM31&detalle=Plan_insumo_det
            /api/Polling/Data?recurso=AM31&operacion=Aplicar
        ---

