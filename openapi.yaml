    post:
      tags:
        - AF31 - Facturas
      summary: Agregar Facturas
      description: |
        
        Este endpoint permite enviar información  o ejecutar operaciones  sobre registros de Facturas. Teniendo en cuenta que algunos parámetros se envían por query string y los datos a procesar agregando al body en formato JSON.

        Parámetros por query

        - `recurso`

        - `empresa_id`
        - `detalle`
        - `ids`
        - `motivo`
        - `operacion` 

        ---

          ## Ejemplo de uso
          ### - Con autenticación Basic Auth (requiere empresa_id)

            /api/Polling/Data?recurso=AF31&empresa_id={empresa_id}      
            /api/Polling/Data?recurso=AF31&empresa_id={empresa_id}&detalle=Factura_clasificacion
            /api/Polling/Data?recurso=AF31&empresa_id={empresa_id}&operacion=Aplicar&ids={ids}
            /api/Polling/Data?recurso=AF31&empresa_id={empresa_id}&operacion=Desaplicar&ids={ids}&motivo={motivo}      

          ### - Con autenticación Bearer Token

            /api/Polling/Data?recurso=AF31      
            /api/Polling/Data?recurso=AF31&detalle=Factura_clasificacion
            /api/Polling/Data?recurso=AF31&operacion=Aplicar
        ---

         ## Body (JSON)

           Los datos a procesar deben enviarse en el cuerpo de la petición. El detalle del formato se encuentra en la sección de **Examples**. 
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: AF31

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL
        - name: operacion
          in: query
          required: false
          schema:
            type: string
            example: Aplicar
          description: Ingrese la operación que desea realizar. Ejemplo Aplicar,
            Desaplicar o Anular

        - name: ids
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID del registro, pudiendo pasar dos o más. Ejemplo 1,2,3

        - name: motivo
          in: query
          required: false
          schema:
            type: string
            example: Aplica desde API
          description: En el caso de las operaciones Anular y Desaplicar puede ingresar el
            motivo

        - name: detalle
          in: query
          required: false
          schema:
            type: string
            example: Factura_clasificacion
          description: Ingrese el nombre de la clase que desea consultar. Ejemplo
            Factura_clasificacion, Factura_cuota, Factura_baja,
            Factura_retencion, Factura_flete

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            examples:
