             /api/Polling/Data?recurso=OX12&filtro_campo=Fecha&filtro_valor=2026      
             /api/Polling/Data?recurso=OX12&pagina=1      
             /api/Polling/Data?recurso=OX12&pagina=1&registros_por_pagina=100      
             /api/Polling/Data?recurso=OX12&detalle=Timbrado_expedidor
