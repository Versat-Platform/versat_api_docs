      summary: Listar Facturas
      description: Obtiene todos los registros de Facturas. Permite filtrar resultados
        mediante parámetros de búsqueda por campo y valor.
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: AI71

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

        - name: filtro_campo
          in: query
          required: false
          schema:
            type: string
            example: Fecha
          description: Nombre de la propiedad a filtrar

        - name: filtro_valor
          in: query
          required: false
          schema:
            type: string
            example: 2026
          description: Valor a filtrar. Si el valor es una propiedad del tipo fecha, puede
            filtrar por mes y año de la siguiente forma 01/2026 o solo por el
            año 2026

        - name: pagina
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: Página a mostrar con intervalo de 100 registros; pasar valor "0"
