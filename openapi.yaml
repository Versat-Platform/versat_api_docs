                      Valor: 123.45 # Valor del Pagaré
                      Firma_ro: "ABCD" # Situación
                      Status: "ABCD"
                      Negociable_sn: "ABCD" # Negociable
                      Imprime_fact_sn: "ABCD" # Imprimir facturas de referencia
                      Zafra_txt: "ABCD"
                      Entidad_txt: "ABCD"
                      Unidad_txt: "ABCD"
                      Moneda_txt: "ABCD"
                detalle_Pagare_entidad:
                  summary: Clase detalle Pagare_entidad
                  value:
                    - id: 123
                      Pagare_id: 123
                      Entidad_id: 123 # Codeudor
                      Tipo_codeudor: "ABCD" # Tipo
