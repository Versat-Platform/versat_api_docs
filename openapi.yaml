    get:
      tags:
        - RC31 - Clientes
      summary: Listar Clientes
      description: |
        Este endpoint permite consultar registros de Clientes utilizando el parámetro obligatorio `recurso`. Al utilizar la autenticación básica el parámetro `empresa_id` es obligatorio, no es necesario si se usa autenticación Bearer Token.  A partir de este valor, puedes complementar la consulta con parámetros opcionales para:

        - Filtrar los datos por campo y valor.

        - Caso sea un recurso con detalle se puede obtener consultar los mismos mediante el parámetro `detalle`.

        - Aplicar paginación y controlar la cantidad de registros devueltos.

        Estos parámetros pueden utilizarse de forma individual o combinada según sea necesario.  
        La API procesa todos los valores enviados en conjunto para devolver el resultado más ajustado posible.

        Si no se envían parámetros opcionales, se retornarán los registros estándar del recurso solicitado.

        ---

           ## Ejemplo de uso
           ### - Con autenticación Basic Auth (requiere empresa_id)

            /api/Polling/Data?recurso=RC31&empresa_id={empresa_id}
            /api/Polling/Data?recurso=RC31&empresa_id={empresa_id}&filtro_campo=Fecha&filtro_valor=2026      
            /api/Polling/Data?recurso=RC31&empresa_id={empresa_id}&pagina=1     
            /api/Polling/Data?recurso=RC31&empresa_id={empresa_id}&pagina=1&registros_por_pagina=100      
            /api/Polling/Data?recurso=RC31&empresa_id={empresa_id}&detalle=Contacto 

           ### - Con autenticación Bearer Token

             /api/Polling/Data?recurso=RC31
             /api/Polling/Data?recurso=RC31&filtro_campo=Fecha&filtro_valor=2026      
             /api/Polling/Data?recurso=RC31&pagina=1      
             /api/Polling/Data?recurso=RC31&pagina=1&registros_por_pagina=100      
             /api/Polling/Data?recurso=RC31&detalle=Contacto
      parameters:
        - name: recurso
          in: query
          required: true
          schema:
            type: string
            example: RC31

        - name: empresa_id
          in: query
          required: false
          schema:
            type: integer
            example: 1
          description: ID de la empresa a recuperar los datos. Al usar la Autenticación
            del tipo 'Bearer Token' este parámetro no es necesario en la URL

        - name: filtro_campo
          in: query
